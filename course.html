  <header class="site-header">
    <nav class="navbar container" aria-label="Course navigation">
      <a href="index.html" class="logo" aria-label="Thicha home">

      <button type="button" class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Menu">

        <a href="index.html" class="btn btn-small btn-login">Home</a>
      </div>

  <main class="course-page">
    <section class="course-shell container">
      <aside class="course-sidebar" id="course-sidebar">
        <p class="eyebrow" id="course-sidebar-eyebrow">Course</p>
        <h2 id="sidebar-course-title">Loading...</h2>
        <p id="sidebar-course-description">Loading course details...</p>
        <div class="module-nav" id="module-nav"></div>
        <button type="button" class="add-module-sidebar-btn" id="add-module-sidebar-btn" style="display: none;">+ Add Module</button>
      </aside>

      <button type="button" class="course-sidebar-toggle" id="course-sidebar-toggle" aria-label="Hide course sidebar" aria-expanded="true">&lt;</button>

      <section class="course-main">
        <article class="course-main-card course-header-card">
          <div class="course-topline">
            <div>

              <h1 id="course-title">Loading...</h1>
            </div>

        <article class="course-main-card course-module-card">

            <div id="module-view-area">

            </div>

            <form class="inline-module-editor" id="inline-module-editor">

              <h2 id="module-editor-heading">Edit module</h2>

              <div class="form-group">
                <label for="edit-module-title">Module title</label>
                <input type="text" id="edit-module-title" required />
              </div>

              <div class="content-block-editor-list" id="content-block-editor-list"></div>

              <div class="quiz-question-editor" id="quiz-question-editor" hidden>
                <div class="quiz-editor-topline">
                  <div>
                    <p class="eyebrow">Quiz builder</p>
                    <h3>Questions</h3>
                  </div>
                </div>
                <div class="quiz-question-editor-list" id="quiz-question-editor-list"></div>
                <button type="button" class="add-content-block-btn" id="add-quiz-question-btn">+ Add Question</button>

              <div class="add-block-area">

                <div class="block-type-menu" id="block-type-menu" hidden>
                  <button type="button" data-block-type="text">Textbox</button>
                  <button type="button" data-block-type="video">Add Video</button>
                  <button type="button" data-block-type="image">Add Picture</button>
                  <button type="button" data-block-type="file">Add File</button>

              <div class="editor-actions module-editor-actions">
                <button type="button" class="btn btn-secondary" id="delete-module-btn">Delete Module</button>

    const cancelInlineEditorBtn = document.getElementById("cancel-inline-editor-btn");

    const quizQuestionEditor = document.getElementById("quiz-question-editor");
    const quizQuestionEditorList = document.getElementById("quiz-question-editor-list");
    const addQuizQuestionBtn = document.getElementById("add-quiz-question-btn");
    const addContentBlockBtn = document.getElementById("add-content-block-btn");
    const blockTypeMenu = document.getElementById("block-type-menu");
    const addModuleSidebarBtn = document.getElementById("add-module-sidebar-btn");
    const deleteModuleBtn = document.getElementById("delete-module-btn");
    const editorForm = document.getElementById("inline-module-editor");
    const moduleNav = document.getElementById("module-nav");

    const courseNavigationArea = document.getElementById("course-navigation-area");
    const courseShell = document.querySelector(".course-shell");

    let currentUser = null;
    let currentRole = "student";
    let currentCourse = {
      title: "Complete Beginner Thai Course",
      description: "A structured beginner course for learning Thai step by step.",
      modules: [
        {
          title: "Module 1: Introduction",
          text: "Add your first course text here.",
          blocks: [{ type: "text", value: "Add your first course text here." }],
          submodules: []
        }
      ]
    };
    let selectedModuleIndex = 0;
    let selectedSubmoduleIndex = null;
    let expandedModules = new Set([0]);
    let isSidebarCollapsed = window.innerWidth <= 900;

    if (isSidebarCollapsed) {
      courseShell.classList.add("sidebar-collapsed");
    }

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) element.textContent = value;
    }

    function canEditCourse() {
      return currentRole === "teacher" || currentRole === "admin";
    }

    function normalizeBlocks(item) {
      if (Array.isArray(item?.blocks)) {
        return item.blocks
          .filter((block) => block && ["text", "video", "image", "file"].includes(block.type))
          .map((block) => ({
            type: block.type,
            value: block.value || block.url || "",
            name: block.name || block.fileName || "",
            path: block.path || ""
          }));
      }

      if (item?.text) {
        return [{ type: "text", value: item.text }];
      }

      return [];
    }

    function legacyTextFromBlocks(blocks) {
      return (blocks || [])
        .filter((block) => block.type === "text" && block.value)
        .map((block) => block.value)
        .join("\n\n");
    }

    function normalizeQuestions(item) {
      if (!Array.isArray(item?.questions)) return [];

      return item.questions.map((question, index) => {
        const type = question?.type === "written" ? "written" : "mcq";
        const options = Array.isArray(question?.options)
          ? question.options.map((option) => ({
              text: option?.text || "",
              correct: Boolean(option?.correct)
            }))
          : [];

        const audio = question?.audio && question.audio.url ? {
          url: question.audio.url || "",
          name: question.audio.name || "Audio question",
          path: question.audio.path || ""
        } : null;

        return {
          type,
          prompt: question?.prompt || `Question ${index + 1}`,
          audio,
          options: type === "mcq" ? (options.length ? options : [
            { text: "Option 1", correct: true },
            { text: "Option 2", correct: false }
          ]) : []
        };
      });
    }

    function itemKind(item) {
      return item?.kind === "quiz" ? "quiz" : "lesson";
    }

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalizeCourse() {
      if (!Array.isArray(currentCourse.modules)) currentCourse.modules = [];
      currentCourse.modules = currentCourse.modules.map((module, index) => {
        const moduleBlocks = normalizeBlocks(module);

        return {
          title: module?.title || `Module ${index + 1}`,
          kind: "lesson",
          text: module?.text || legacyTextFromBlocks(moduleBlocks),
          blocks: moduleBlocks,
          submodules: Array.isArray(module?.submodules)
            ? module.submodules.map((submodule, subIndex) => {
                const kind = itemKind(submodule);
                const submoduleBlocks = normalizeBlocks(submodule);

                return {
                  title: submodule?.title || `${kind === "quiz" ? "Quiz" : "Submodule"} ${subIndex + 1}`,
                  kind,
                  text: submodule?.text || legacyTextFromBlocks(submoduleBlocks),
                  blocks: kind === "quiz" ? [] : submoduleBlocks,
                  questions: kind === "quiz" ? normalizeQuestions(submodule) : []
                };
              })
            : []
        };
      });
    }

    function getSelectedItem() {
      const module = currentCourse.modules?.[selectedModuleIndex];
      if (!module) return null;

      if (selectedSubmoduleIndex === null) {
        return {
          type: "module",
          item: module,
          module,
          label: "Module",
          titleFallback: `Module ${selectedModuleIndex + 1}`
        };
      }

      const submodule = module.submodules?.[selectedSubmoduleIndex];
      if (!submodule) return null;

      return {
        type: "submodule",
        item: submodule,
        module,
        label: "Submodule",
        titleFallback: `Submodule ${selectedSubmoduleIndex + 1}`
      };
    }

    function selectModule(index) {
      selectedModuleIndex = index;
      selectedSubmoduleIndex = null;
      closeInlineEditor();
      renderCourse();
    }

    function selectSubmodule(moduleIndex, submoduleIndex) {
      selectedModuleIndex = moduleIndex;
      selectedSubmoduleIndex = submoduleIndex;
      expandedModules.add(moduleIndex);
      closeInlineEditor();
      renderCourse();
    }

    function renderCourse() {
      normalizeCourse();
      setText("course-title", currentCourse.title || "Untitled course");
      setText("sidebar-course-title", currentCourse.title || "Untitled course");
      setText("course-description", currentCourse.description || "");
      setText("sidebar-course-description", currentCourse.description || "");
      setText("course-mode-label", canEditCourse() ? "Teacher course view" : "Course content");

      addModuleSidebarBtn.style.display = canEditCourse() ? "inline-flex" : "none";
      editModuleBtn.style.display = canEditCourse() && getSelectedItem() ? "inline-flex" : "none";
      const selected = getSelectedItem();
      editModuleBtn.textContent = selected?.item.kind === "quiz" ? "Edit Quiz" : (selectedSubmoduleIndex === null ? "Edit Module" : "Edit Submodule");
      renderModuleNav();
      renderSelectedContent();
    }

    function renderModuleNav() {
      moduleNav.innerHTML = "";
      const modules = currentCourse.modules || [];

      if (!modules.length) {
        moduleNav.innerHTML = '<div class="empty-course-state">No modules yet.</div>';
        return;
      }

      modules.forEach((module, index) => {
        const moduleWrap = document.createElement("div");
        moduleWrap.className = "module-nav-item";
        moduleWrap.classList.toggle("active", index === selectedModuleIndex && selectedSubmoduleIndex === null);

        const moduleRow = document.createElement("div");
        moduleRow.className = "module-nav-row";

        const moduleButton = document.createElement("button");
        moduleButton.type = "button";
        moduleButton.className = "module-title-btn";
        moduleButton.textContent = module.title || `Module ${index + 1}`;
        moduleButton.addEventListener("click", () => selectModule(index));

        const expandButton = document.createElement("button");
        expandButton.type = "button";
        expandButton.className = "module-expand-btn";
        expandButton.textContent = expandedModules.has(index) ? "⌃" : "⌄";
        expandButton.setAttribute("aria-label", expandedModules.has(index) ? "Hide submodules" : "Show submodules");
        expandButton.addEventListener("click", (event) => {
          event.stopPropagation();
          if (expandedModules.has(index)) {
            expandedModules.delete(index);
          } else {
            expandedModules.add(index);
          }
          renderModuleNav();
        });

        moduleRow.append(moduleButton, expandButton);
        moduleWrap.appendChild(moduleRow);

        if (expandedModules.has(index)) {
          const submoduleList = document.createElement("div");
          submoduleList.className = "submodule-list";

          if (module.submodules.length) {
            module.submodules.forEach((submodule, subIndex) => {
              const subButton = document.createElement("button");
              subButton.type = "button";
              subButton.className = "submodule-btn";
              subButton.textContent = `${submodule.kind === "quiz" ? "Quiz: " : ""}${submodule.title || `Submodule ${subIndex + 1}`}`;
              subButton.classList.toggle("active", index === selectedModuleIndex && subIndex === selectedSubmoduleIndex);
              subButton.addEventListener("click", () => selectSubmodule(index, subIndex));
              submoduleList.appendChild(subButton);
            });
          } else {
            const emptyState = document.createElement("div");
            emptyState.className = "empty-submodule-state";
            emptyState.textContent = "No submodules yet.";
            submoduleList.appendChild(emptyState);
          }

          if (canEditCourse()) {
            const addChoiceWrap = document.createElement("div");
            addChoiceWrap.className = "submodule-add-choice";

            const addSubmoduleButton = document.createElement("button");
            addSubmoduleButton.type = "button";
            addSubmoduleButton.className = "add-submodule-btn";
            addSubmoduleButton.textContent = "+ Normal Submodule";
            addSubmoduleButton.addEventListener("click", () => addSubmodule(index));

            const addQuizButton = document.createElement("button");
            addQuizButton.type = "button";
            addQuizButton.className = "add-submodule-btn";
            addQuizButton.textContent = "+ Quiz";
            addQuizButton.addEventListener("click", () => addQuizSubmodule(index));

            addChoiceWrap.append(addSubmoduleButton, addQuizButton);
            submoduleList.appendChild(addChoiceWrap);
          }

          moduleWrap.appendChild(submoduleList);
        }

        moduleNav.appendChild(moduleWrap);
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function plainTextToHtml(value) {
      return escapeHtml(value || "").replace(/\n/g, "<br>");
    }

    function sanitizeRichText(html) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = html || "";

      const allowedTags = new Set(["B", "STRONG", "I", "EM", "U", "BR", "P", "DIV", "UL", "OL", "LI", "H3", "H4", "SPAN"]);
      const allowedStyles = new Set(["font-weight", "font-style", "text-decoration"]);

      function cleanNode(node) {
        Array.from(node.childNodes).forEach((child) => {
          if (child.nodeType === Node.ELEMENT_NODE) {
            if (!allowedTags.has(child.tagName)) {
              const fragment = document.createDocumentFragment();
              while (child.firstChild) fragment.appendChild(child.firstChild);
              child.replaceWith(fragment);
              cleanNode(node);
              return;
            }

            Array.from(child.attributes).forEach((attr) => {
              if (attr.name !== "style") {
                child.removeAttribute(attr.name);
                return;
              }

              const kept = [];
              child.getAttribute("style").split(";").forEach((rule) => {
                const [property, value] = rule.split(":").map((part) => part && part.trim());
                if (property && value && allowedStyles.has(property.toLowerCase())) {
                  kept.push(`${property}: ${value}`);
                }
              });

              if (kept.length) child.setAttribute("style", kept.join("; "));
              else child.removeAttribute("style");
            });

            cleanNode(child);
          }
        });
      }

      cleanNode(wrapper);
      return wrapper.innerHTML.trim();
    }

    function isProbablyPlainText(value) {
      return value && !/[<][a-zA-Z][\s\S]*[>]/.test(value);
    }

    function normalizeVideoUrl(url) {
      const rawUrl = String(url || "").trim();
      if (!rawUrl) return "";

      try {
        const parsedUrl = new URL(rawUrl);
        const hostname = parsedUrl.hostname.replace(/^www\./, "");

        if (hostname === "youtube.com" || hostname === "m.youtube.com") {
          if (parsedUrl.pathname === "/watch") {
            const videoId = parsedUrl.searchParams.get("v");
            return videoId ? `https://www.youtube.com/embed/${videoId}` : rawUrl;
          }

          if (parsedUrl.pathname.startsWith("/shorts/")) {
            const videoId = parsedUrl.pathname.split("/")[2];
            return videoId ? `https://www.youtube.com/embed/${videoId}` : rawUrl;
          }

          if (parsedUrl.pathname.startsWith("/embed/")) {
            const videoId = parsedUrl.pathname.split("/")[2];
            return videoId ? `https://www.youtube.com/embed/${videoId}` : rawUrl;
          }
        }

        if (hostname === "youtu.be") {
          const videoId = parsedUrl.pathname.replace("/", "").split("?")[0];
          return videoId ? `https://www.youtube.com/embed/${videoId}` : rawUrl;
        }
      } catch (error) {
        return rawUrl;
      }

      return rawUrl;
    }

    function renderBlockView(block) {
      const value = block.value || "";

      if (block.type === "video") {
        const videoUrl = normalizeVideoUrl(value);
        if (!videoUrl) return '<div class="empty-block-state">No video URL added yet.</div>';
        return `<div class="content-video-block"><iframe src="${escapeHtml(videoUrl)}" title="Video lesson" allowfullscreen></iframe></div>`;
      }

      if (block.type === "image") {
        if (!value) return '<div class="empty-block-state">No picture URL added yet.</div>';
        return `<div class="content-image-block"><img src="${escapeHtml(value)}" alt="Course content image" /></div>`;
      }

      if (block.type === "file") {
        if (!value) return '<div class="empty-block-state">No file uploaded yet.</div>';
        const fileName = block.name || value.split("/").pop() || "Course material";
        return `<a class="content-file-block" href="${escapeHtml(value)}" target="_blank" rel="noopener" download><span>FILE</span><strong>${escapeHtml(fileName)}</strong><small>Open or download</small></a>`;
      }

      const richText = isProbablyPlainText(value) ? plainTextToHtml(value || "Empty textbox.") : sanitizeRichText(value || "Empty textbox.");
      return `<div class="module-text-display rich-text-display">${richText}</div>`;
    }

    function renderQuestionAudio(question) {
      if (!question?.audio?.url) return "";
      return `
        <div class="quiz-audio-player">
          <strong>${escapeHtml(question.audio.name || "Audio question")}</strong>
          <audio controls preload="metadata" src="${escapeHtml(question.audio.url)}"></audio>
        </div>
      `;
    }

    function renderQuizStudentView(quiz) {
      const questions = normalizeQuestions(quiz);
      if (!questions.length) {
        return '<div class="empty-block-state">No quiz questions added yet.</div>';
      }

      const shuffled = shuffleArray(questions.map((question, index) => ({ ...question, originalIndex: index })));
      const questionsHtml = shuffled.map((question, displayIndex) => {
        const name = `quiz-q-${question.originalIndex}`;
        const prompt = `<h3>${displayIndex + 1}. ${escapeHtml(question.prompt)}</h3>`;
        const audio = renderQuestionAudio(question);

        if (question.type === "written") {
          return `<div class="quiz-question" data-question-index="${question.originalIndex}" data-question-type="written">${prompt}${audio}<textarea class="quiz-written-answer" name="${name}" placeholder="Write your answer here..."></textarea></div>`;
        }

        const optionsHtml = question.options.map((option, optionIndex) => `
          <label class="quiz-option">
            <input type="checkbox" name="${name}" value="${optionIndex}">
            <span>${escapeHtml(option.text || `Option ${optionIndex + 1}`)}</span>
          </label>
        `).join("");

        return `<div class="quiz-question" data-question-index="${question.originalIndex}" data-question-type="mcq">${prompt}${audio}<div class="quiz-options">${optionsHtml}</div></div>`;
      }).join("");

      return `
        <form class="student-quiz" id="student-quiz-form">
          ${questionsHtml}
          <button type="submit" class="btn">Submit Quiz</button>
          <div class="quiz-result" id="quiz-result" aria-live="polite"></div>
        </form>
      `;
    }

    function bindStudentQuizSubmit(quiz) {
      const quizForm = document.getElementById("student-quiz-form");
      if (!quizForm) return;

      quizForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const questions = normalizeQuestions(quiz);
        let gradedCount = 0;
        let correctCount = 0;

        questions.forEach((question, questionIndex) => {
          if (question.type !== "mcq") return;
          gradedCount += 1;
          const checked = Array.from(quizForm.querySelectorAll(`input[name="quiz-q-${questionIndex}"]:checked`)).map((input) => Number(input.value));
          const correct = question.options
            .map((option, optionIndex) => option.correct ? optionIndex : null)
            .filter((optionIndex) => optionIndex !== null);

          const sameLength = checked.length === correct.length;
          const sameValues = correct.every((optionIndex) => checked.includes(optionIndex));
          if (sameLength && sameValues) correctCount += 1;
        });

        const result = document.getElementById("quiz-result");
        if (result) {
          result.textContent = gradedCount
            ? `Submitted. MCQ score: ${correctCount}/${gradedCount}. Written answers were submitted for review.`
            : "Submitted. Written answers were submitted for review.";
        }
      });
    }

    function getFlatCourseItems() {
      const items = [];
      (currentCourse.modules || []).forEach((module, moduleIndex) => {
        items.push({
          moduleIndex,
          submoduleIndex: null,
          title: module.title || `Module ${moduleIndex + 1}`,
          label: "Module"
        });

        (module.submodules || []).forEach((submodule, submoduleIndex) => {
          items.push({
            moduleIndex,
            submoduleIndex,
            title: submodule.title || `Submodule ${submoduleIndex + 1}`,
            label: submodule.kind === "quiz" ? "Quiz" : "Submodule"
          });
        });
      });
      return items;
    }

    function getCurrentFlatIndex(items) {
      return items.findIndex((item) => item.moduleIndex === selectedModuleIndex && item.submoduleIndex === selectedSubmoduleIndex);
    }

    function goToCoursePart(moduleIndex, submoduleIndex) {
      if (submoduleIndex === null) {
        selectModule(moduleIndex);
      } else {
        selectSubmodule(moduleIndex, submoduleIndex);
      }
    }

    function renderPartNavigation() {
      const items = getFlatCourseItems();
      const currentIndex = getCurrentFlatIndex(items);
      if (currentIndex === -1 || items.length <= 1) return "";

      const previous = items[currentIndex - 1] || null;
      const next = items[currentIndex + 1] || null;
      if (!previous && !next) return "";

      const previousButton = previous
        ? `<button type="button" class="part-nav-btn" data-module-index="${previous.moduleIndex}" data-submodule-index="${previous.submoduleIndex === null ? "" : previous.submoduleIndex}"><span>Previous</span><strong>${escapeHtml(previous.title)}</strong></button>`
        : `<div class="part-nav-empty"></div>`;

      const nextButton = next
        ? `<button type="button" class="part-nav-btn" data-module-index="${next.moduleIndex}" data-submodule-index="${next.submoduleIndex === null ? "" : next.submoduleIndex}"><span>Next</span><strong>${escapeHtml(next.title)}</strong></button>`
        : `<div class="part-nav-empty"></div>`;

      return `<div class="course-part-navigation">${previousButton}${nextButton}</div>`;
    }

    function renderNavigationCard() {

      const navigationHtml = renderPartNavigation();
      courseNavigationArea.innerHTML = navigationHtml;
      courseNavigationCard.hidden = !navigationHtml;

    function hideNavigationCard() {
      if (!courseNavigationCard || !courseNavigationArea) return;

    function bindPartNavigation() {
      if (!courseNavigationArea) return;
      courseNavigationArea.querySelectorAll(".part-nav-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const moduleIndex = Number(button.dataset.moduleIndex);
          const submoduleIndex = button.dataset.submoduleIndex === "" ? null : Number(button.dataset.submoduleIndex);
          goToCoursePart(moduleIndex, submoduleIndex);
        });
      });

    function blockLabel(type) {
      if (type === "video") return "Video URL";
      if (type === "image") return "Picture URL";
      if (type === "file") return "File Upload";
      return "Textbox";
    }

    function renderBlockEditor(blocks = []) {
      blockEditorList.innerHTML = "";

      if (!blocks.length) {
        blocks = [{ type: "text", value: "" }];
      }

      blocks.forEach((block) => addBlockEditor(block.type, block.type === "file" ? block : block.value));

    function addBlockEditor(type, value = "") {
      const block = document.createElement("div");
      block.className = "content-block-editor";
      block.dataset.blockType = type;
      if (typeof value === "object" && value !== null) {
        block.dataset.fileName = value.name || "";
        block.dataset.filePath = value.path || "";
        value = value.value || "";
      }

      const header = document.createElement("div");
      header.className = "content-block-editor-header";

      const label = document.createElement("strong");
      label.textContent = blockLabel(type);

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-content-block-btn";
      removeButton.textContent = "Remove";
      removeButton.addEventListener("click", () => block.remove());

      header.append(label, removeButton);
      block.appendChild(header);

      if (type === "text") {
        const toolbar = document.createElement("div");
        toolbar.className = "rich-text-toolbar";

        const tools = [
          { command: "bold", label: "B", title: "Bold" },
          { command: "italic", label: "I", title: "Italic" },
          { command: "underline", label: "U", title: "Underline" },
          { command: "insertUnorderedList", label: "• List", title: "Bullet list" },
          { command: "formatBlock", value: "h3", label: "H", title: "Heading" },
          { command: "formatBlock", value: "div", label: "Normal", title: "Normal text" }
        ];

        const editor = document.createElement("div");
        editor.className = "content-block-input rich-text-input";
        editor.contentEditable = "true";
        editor.dataset.placeholder = "Add text here...";
        editor.innerHTML = isProbablyPlainText(value) ? plainTextToHtml(value) : sanitizeRichText(value || "");

        tools.forEach((tool) => {
          const toolButton = document.createElement("button");
          toolButton.type = "button";
          toolButton.className = "rich-text-tool-btn";
          toolButton.textContent = tool.label;
          toolButton.title = tool.title;
          toolButton.addEventListener("click", () => {
            editor.focus();
            document.execCommand(tool.command, false, tool.value || null);
          });
          toolbar.appendChild(toolButton);
        });

        block.append(toolbar, editor);
      } else if (type === "file") {
        const uploadBox = document.createElement("label");
        uploadBox.className = "file-upload-dropzone";

        const input = document.createElement("input");
        input.type = "file";
        input.className = "content-block-input file-block-input";
        input.multiple = true;
        input.dataset.existingUrl = value || "";
        input.dataset.existingName = block.dataset.fileName || "";
        input.dataset.existingPath = block.dataset.filePath || "";
        input.accept = ".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.png,.jpg,.jpeg,.zip";

        const icon = document.createElement("span");
        icon.className = "file-upload-icon";
        icon.textContent = "FILE";

        const title = document.createElement("strong");
        title.textContent = "Drop files here or click to upload";

        const note = document.createElement("small");
        note.className = "file-upload-note";
        note.textContent = value ? `Current file: ${block.dataset.fileName || "Uploaded material"}` : "PDF, DOCX, PPTX, ZIP, images, or text files";

        function updateSelectedFiles() {
          const names = Array.from(input.files || []).map((file) => file.name).join(", ");
          note.textContent = names || (value ? `Current file: ${block.dataset.fileName || "Uploaded material"}` : "PDF, DOCX, PPTX, ZIP, images, or text files");
        }

        input.addEventListener("change", updateSelectedFiles);

        ["dragenter", "dragover"].forEach((eventName) => {
          uploadBox.addEventListener(eventName, (event) => {
            event.preventDefault();
            uploadBox.classList.add("drag-over");
          });
        });

        ["dragleave", "drop"].forEach((eventName) => {
          uploadBox.addEventListener(eventName, (event) => {
            event.preventDefault();
            uploadBox.classList.remove("drag-over");
          });
        });

        uploadBox.addEventListener("drop", (event) => {
          const droppedFiles = Array.from(event.dataTransfer?.files || []);
          if (!droppedFiles.length) return;

          const transfer = new DataTransfer();
          droppedFiles.forEach((file) => transfer.items.add(file));
          input.files = transfer.files;
          updateSelectedFiles();
        });

        uploadBox.append(input, icon, title, note);
        block.appendChild(uploadBox);
      } else {
        const input = document.createElement("input");
        input.type = "url";
        input.className = "content-block-input";
        input.placeholder = type === "video" ? "Paste video URL here..." : "Paste picture URL here...";
        input.value = type === "video" ? normalizeVideoUrl(value) : (value || "");
        if (type === "video") {
          input.addEventListener("blur", () => {
            input.value = normalizeVideoUrl(input.value);
          });
        }
        block.appendChild(input);
      }

      blockEditorList.appendChild(block);
    }

    function createAudioQuestionUploader(audio = null) {
      const wrap = document.createElement("div");
      wrap.className = "quiz-audio-editor";

      const title = document.createElement("strong");
      title.textContent = "Question audio (optional)";

      const uploadBox = document.createElement("label");
      uploadBox.className = "file-upload-dropzone quiz-audio-dropzone";

      const input = document.createElement("input");
      input.type = "file";
      input.className = "quiz-audio-input";
      input.accept = "audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac";
      input.dataset.existingUrl = audio?.url || "";
      input.dataset.existingName = audio?.name || "";
      input.dataset.existingPath = audio?.path || "";

      const icon = document.createElement("span");
      icon.className = "file-upload-icon";
      icon.textContent = "AUDIO";

      const label = document.createElement("strong");
      label.textContent = "Drop audio here or click to upload";

      const note = document.createElement("small");
      note.className = "file-upload-note";
      note.textContent = audio?.name ? `Current audio: ${audio.name}` : "MP3, WAV, M4A, AAC, OGG, or FLAC";

      const removeAudioButton = document.createElement("button");
      removeAudioButton.type = "button";
      removeAudioButton.className = "remove-content-block-btn quiz-audio-remove-btn";
      removeAudioButton.textContent = "Remove Audio";
      removeAudioButton.hidden = !audio?.url;

      function updateSelectedAudio() {
        const file = input.files?.[0];
        note.textContent = file?.name || (input.dataset.existingUrl ? `Current audio: ${input.dataset.existingName || "Audio question"}` : "MP3, WAV, M4A, AAC, OGG, or FLAC");
        removeAudioButton.hidden = !(file || input.dataset.existingUrl);
      }

      input.addEventListener("change", updateSelectedAudio);

      removeAudioButton.addEventListener("click", () => {
        input.value = "";
        input.dataset.existingUrl = "";
        input.dataset.existingName = "";
        input.dataset.existingPath = "";
        updateSelectedAudio();
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        uploadBox.addEventListener(eventName, (event) => {
          event.preventDefault();
          uploadBox.classList.add("drag-over");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        uploadBox.addEventListener(eventName, (event) => {
          event.preventDefault();
          uploadBox.classList.remove("drag-over");
        });
      });

      uploadBox.addEventListener("drop", (event) => {
        const file = event.dataTransfer?.files?.[0];
        if (!file) return;
        const transfer = new DataTransfer();
        transfer.items.add(file);
        input.files = transfer.files;
        updateSelectedAudio();
      });

      uploadBox.append(input, icon, label, note);
      wrap.append(title, uploadBox, removeAudioButton);
      return wrap;
    }

    function addQuestionEditor(question = { type: "mcq", prompt: "", options: [] }) {
      const card = document.createElement("div");
      card.className = "quiz-question-editor-card";

      const header = document.createElement("div");
      header.className = "quiz-question-editor-header";

      const typeSelect = document.createElement("select");
      typeSelect.className = "quiz-question-type";
      typeSelect.innerHTML = '<option value="mcq">MCQ</option><option value="written">Written question</option>';
      typeSelect.value = question.type === "written" ? "written" : "mcq";

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-content-block-btn";
      removeButton.textContent = "Remove Question";
      removeButton.addEventListener("click", () => card.remove());

      header.append(typeSelect, removeButton);

      const promptInput = document.createElement("textarea");
      promptInput.className = "quiz-question-prompt";
      promptInput.placeholder = "Question text...";
      promptInput.value = question.prompt || "";

      const audioUploader = createAudioQuestionUploader(question.audio || null);

      const optionsBox = document.createElement("div");
      optionsBox.className = "quiz-option-editor-list";

      const addOptionButton = document.createElement("button");
      addOptionButton.type = "button";
      addOptionButton.className = "add-content-block-btn quiz-add-option-btn";
      addOptionButton.textContent = "+ Add Option";
      addOptionButton.addEventListener("click", () => addOptionEditor(optionsBox, { text: "", correct: false }));

      function syncType() {
        const isMcq = typeSelect.value === "mcq";
        optionsBox.hidden = !isMcq;
        addOptionButton.hidden = !isMcq;
        if (isMcq && !optionsBox.children.length) {
          addOptionEditor(optionsBox, { text: "", correct: true });
          addOptionEditor(optionsBox, { text: "", correct: false });
        }
      }

      typeSelect.addEventListener("change", syncType);
      (question.options?.length ? question.options : [{ text: "", correct: true }, { text: "", correct: false }]).forEach((option) => addOptionEditor(optionsBox, option));

      card.append(header, promptInput, audioUploader, optionsBox, addOptionButton);
      quizQuestionEditorList.appendChild(card);
      syncType();
    }

    function addOptionEditor(optionsBox, option = { text: "", correct: false }) {
      const row = document.createElement("div");
      row.className = "quiz-option-editor-row";

      const correctLabel = document.createElement("label");
      correctLabel.className = "quiz-correct-toggle";

      const textInput = document.createElement("input");
      textInput.type = "text";

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-content-block-btn";
      removeButton.textContent = "Remove";
      removeButton.addEventListener("click", () => row.remove());

      row.append(correctLabel, textInput, removeButton);
      optionsBox.appendChild(row);
    }

    async function collectQuizQuestions() {
      const collected = [];
      const cards = Array.from(quizQuestionEditorList.querySelectorAll(".quiz-question-editor-card"));

      for (const card of cards) {
        const type = card.querySelector(".quiz-question-type")?.value === "written" ? "written" : "mcq";
        const prompt = card.querySelector(".quiz-question-prompt")?.value.trim() || "";
        const audioInput = card.querySelector(".quiz-audio-input");
        const audioFile = audioInput?.files?.[0] || null;
        let audio = null;

        if (audioFile) {
          const uploadedAudio = await uploadCourseFile(audioFile, "audio");
          audio = {
            url: uploadedAudio.value,
            name: uploadedAudio.name,
            path: uploadedAudio.path
          };
        } else if (audioInput?.dataset.existingUrl) {
          audio = {
            url: audioInput.dataset.existingUrl,
            name: audioInput.dataset.existingName || "Audio question",
            path: audioInput.dataset.existingPath || ""
          };
        }

        const options = Array.from(card.querySelectorAll(".quiz-option-editor-row"))
          .map((row) => ({
            text: row.querySelector(".quiz-option-text")?.value.trim() || "",
            correct: Boolean(row.querySelector(".quiz-option-correct")?.checked)
          }))
          .filter((option) => option.text);

        if (prompt && (type === "written" || options.length >= 2)) {
          collected.push({
            type,
            prompt,
            audio,
            options: type === "mcq" ? options : []
          });
        }
      }

      return collected;
    }

    function safeFileName(name) {
      return String(name || "course-material")
        .replace(/[^a-zA-Z0-9._-]/g, "-")
        .replace(/-+/g, "-");
    }

    async function uploadCourseFile(file, folder = "materials") {
      const filePath = `courses/${courseId}/${folder}/${Date.now()}-${safeFileName(file.name)}`;
      const fileRef = storageRef(storage, filePath);
      await uploadBytes(fileRef, file);
      const url = await getDownloadURL(fileRef);
      return { type: "file", value: url, name: file.name, path: filePath };
    }

    async function collectEditorBlocks() {
      const collected = [];
      const editors = Array.from(blockEditorList.querySelectorAll(".content-block-editor"));

      for (const block of editors) {
        const type = block.dataset.blockType;
        const input = block.querySelector(".content-block-input");

        if (type === "file") {
          const files = Array.from(input?.files || []);
          if (files.length) {
            for (const file of files) {
              collected.push(await uploadCourseFile(file));
            }
          } else if (input?.dataset.existingUrl) {
            collected.push({
              type: "file",
              value: input.dataset.existingUrl,
              name: input.dataset.existingName || "Course material",
              path: input.dataset.existingPath || ""
            });
          }
          continue;
        }

        const inputValue = type === "text"
          ? sanitizeRichText(input?.innerHTML || "")
          : (input?.value.trim() || "");

        if (type && inputValue) {
          collected.push({
            type,
            value: type === "video" ? normalizeVideoUrl(inputValue) : inputValue
          });
        }
      }

      return collected;
    }

    async function saveCourseModules() {
      const courseRef = doc(db, "courses", courseId);
      normalizeCourse();

      try {
        await updateDoc(courseRef, {
          modules: currentCourse.modules || [],
          teacherId: currentCourse.teacherId || currentUser.uid,
          updatedAt: serverTimestamp()
        });
      } catch (error) {
        await setDoc(courseRef, {
          title: currentCourse.title || "Complete Beginner Thai Course",
          description: currentCourse.description || "A structured beginner course for learning Thai step by step.",
          modules: currentCourse.modules || [],
          teacherId: currentUser.uid,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }
    }

    async function loadCourse() {
      const courseRef = doc(db, "courses", courseId);
      const courseSnap = await getDoc(courseRef);

      if (courseSnap.exists()) {
        currentCourse = { id: courseSnap.id, ...courseSnap.data() };
      } else if (canEditCourse()) {
        await setDoc(courseRef, {
          title: currentCourse.title,
          description: currentCourse.description,
          modules: currentCourse.modules,
          teacherId: currentUser.uid,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }

      normalizeCourse();
      selectedModuleIndex = Math.min(selectedModuleIndex, Math.max(0, currentCourse.modules.length - 1));
      const selectedModule = currentCourse.modules[selectedModuleIndex];
      if (!selectedModule || selectedSubmoduleIndex === null || !selectedModule.submodules[selectedSubmoduleIndex]) {
        selectedSubmoduleIndex = null;
      }
      renderCourse();
      renderModuleEditor();
    }

    deleteModuleBtn.addEventListener("click", async () => {

      const selected = getSelectedItem();
      if (!selected) return;

      const itemName = selected.item.title || selected.titleFallback;
      const shouldDelete = confirm(`Delete "${itemName}"?`);
      if (!shouldDelete) return;

      if (selected.type === "submodule") {
        selected.module.submodules.splice(selectedSubmoduleIndex, 1);
        selectedSubmoduleIndex = null;
      } else {
        currentCourse.modules.splice(selectedModuleIndex, 1);
        selectedModuleIndex = Math.min(selectedModuleIndex, Math.max(0, currentCourse.modules.length - 1));

    editorForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!canEditCourse()) {
        alert("Only teachers can edit modules.");
        return;
      }

      const selected = getSelectedItem();
      if (!selected) {
        alert("Please select a module or submodule first.");
        return;
      }

      const title = document.getElementById("edit-module-title").value.trim();

      if (!title) {
        alert(`Please fill in the ${selected.item.kind === "quiz" ? "quiz" : selected.label.toLowerCase()} title.`);
        return;
      }

      const submitButton = editorForm.querySelector('button[type="submit"]');
      const originalSubmitText = submitButton?.textContent || "Save Module";
      const editorButtons = Array.from(editorForm.querySelectorAll("button"));

      try {
        editorButtons.forEach((button) => { button.disabled = true; });
        if (submitButton) submitButton.textContent = "Uploading / Saving...";

        selected.item.title = title;

        if (selected.item.kind === "quiz") {
          const questions = await collectQuizQuestions();
          if (!questions.length) {
            alert("Please add at least one valid quiz question.");
            return;
          }
          selected.item.questions = questions;
          selected.item.blocks = [];
          selected.item.text = "";
        } else {
          const blocks = await collectEditorBlocks();
          if (!blocks.length) {
            alert("Please add at least one content block.");
            return;
          }
          selected.item.blocks = blocks;
          selected.item.text = legacyTextFromBlocks(blocks);
        }

        await saveCourseModules();
        renderCourse();
        closeInlineEditor();
      } catch (error) {
        console.error("Could not save module:", error);
        alert(`Could not save module. ${error?.message || "Please check Firebase Storage rules and try again."}`);
      } finally {
        editorButtons.forEach((button) => { button.disabled = false; });
        if (submitButton) submitButton.textContent = originalSubmitText;
      }
    });

}

sidebarToggle.addEventListener("click", () => {
      isSidebarCollapsed = !isSidebarCollapsed;
      courseShell.classList.toggle("sidebar-collapsed", isSidebarCollapsed);
      sidebarToggle.innerHTML = isSidebarCollapsed ? "&gt;" : "&lt;";
      sidebarToggle.setAttribute("aria-label", isSidebarCollapsed ? "Show course sidebar" : "Hide course sidebar");
      sidebarToggle.setAttribute("aria-expanded", String(!isSidebarCollapsed));
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
          currentRole = userSnap.data().role || "student";
        }
      } catch (error) {
        console.warn("Could not read user role:", error);
      }

      await loadCourse();
    });
  </script>
</body>
</html>
